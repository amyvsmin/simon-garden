<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 380" font-family="DejaVu Sans, Noto Sans CJK TC, PingFang TC, Microsoft JhengHei, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981"/>
    </marker>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- 標題 -->
  <text x="500" y="35" text-anchor="middle" font-size="20" fill="#065f46" font-weight="bold">KW 知識庫 AI 流水線</text>
  <text x="500" y="58" text-anchor="middle" font-size="13" fill="#6b7280">4 段動作 × 5 個資料元件</text>

  <!-- 起點 -->
  <text x="40" y="125" font-size="14" fill="#6b7280">原料</text>
  <path d="M 75 120 L 95 120" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- 段 1 收 -->
  <rect x="100" y="95" width="130" height="55" rx="10" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="165" y="123" text-anchor="middle" font-size="20" fill="#065f46" font-weight="bold">1. 收</text>
  <text x="165" y="143" text-anchor="middle" font-size="12" fill="#047857">LINE 收件入口</text>

  <!-- 段 1 → 段 2 箭頭 -->
  <path d="M 235 120 L 295 120" stroke="#10b981" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 段 2 寫 -->
  <rect x="300" y="95" width="130" height="55" rx="10" fill="#a7f3d0" stroke="#10b981" stroke-width="2"/>
  <text x="365" y="123" text-anchor="middle" font-size="20" fill="#065f46" font-weight="bold">2. 寫</text>
  <text x="365" y="143" text-anchor="middle" font-size="12" fill="#047857">抓取 + 抽概念</text>

  <!-- 段 2 → 段 3 箭頭 -->
  <path d="M 435 120 L 495 120" stroke="#10b981" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 段 3 維 -->
  <rect x="500" y="95" width="130" height="55" rx="10" fill="#6ee7b7" stroke="#10b981" stroke-width="2"/>
  <text x="565" y="123" text-anchor="middle" font-size="20" fill="#065f46" font-weight="bold">3. 維</text>
  <text x="565" y="143" text-anchor="middle" font-size="12" fill="#047857">健檢 + 合併</text>

  <!-- 段 3 → 段 4 箭頭 -->
  <path d="M 635 120 L 695 120" stroke="#10b981" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 段 4 用 -->
  <rect x="700" y="95" width="130" height="55" rx="10" fill="#34d399" stroke="#10b981" stroke-width="2"/>
  <text x="765" y="123" text-anchor="middle" font-size="20" fill="#ffffff" font-weight="bold">4. 用</text>
  <text x="765" y="143" text-anchor="middle" font-size="12" fill="#065f46">查詢 + 合成主題</text>

  <!-- 段 4 → 終點 -->
  <path d="M 835 120 L 880 120" stroke="#10b981" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="890" y="125" font-size="14" fill="#065f46" font-weight="bold">主題筆記</text>

  <!-- 資料元件標籤（在動作節點下方） -->
  <text x="165" y="195" text-anchor="middle" font-size="13" fill="#374151" font-weight="bold">Inbox</text>
  <text x="365" y="195" text-anchor="middle" font-size="13" fill="#374151" font-weight="bold">Reading + Concept</text>
  <text x="565" y="195" text-anchor="middle" font-size="13" fill="#374151" font-weight="bold">Concept</text>
  <text x="765" y="195" text-anchor="middle" font-size="13" fill="#374151" font-weight="bold">Concept + Topic</text>

  <!-- 4 條虛線從動作節點下方連到 ChangeLog -->
  <line x1="165" y1="205" x2="165" y2="270" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="365" y1="205" x2="365" y2="270" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="565" y1="205" x2="565" y2="270" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="765" y1="205" x2="765" y2="270" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- ChangeLog 橫向 banner -->
  <rect x="100" y="270" width="730" height="50" rx="8" fill="#f9fafb" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="465" y="293" text-anchor="middle" font-size="15" fill="#374151" font-weight="bold">ChangeLog</text>
  <text x="465" y="312" text-anchor="middle" font-size="12" fill="#6b7280">橫向稽核日誌、每段動作都會寫紀錄（180 天保留）</text>

  <!-- 圖例 -->
  <text x="40" y="355" font-size="11" fill="#9ca3af">圖例：實線箭頭＝主線流動；虛線＝動作寫進稽核日誌</text>
</svg>
